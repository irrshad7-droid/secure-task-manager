name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Integration Tests
      run: npm test
      env:
        NODE_ENV: test
        PORT: 5000
        MONGODB_URI: mongodb://localhost:27017/dummy_test_db
        JWT_SECRET: super_secret_dummy_jwt_key_for_testing
        JWT_EXPIRES_IN: 15m
